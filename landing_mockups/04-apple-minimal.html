<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueBuilder.ai | Coming Soon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #FAFAFA;
      color: #1A1A1A;
      overflow-x: hidden;
    }
    .tracking-widest-xl {
      letter-spacing: 0.1em;
    }
    @view-transition {
      navigation: auto;
    }
  </style>
</head>
<body>
  <div class="min-h-screen relative flex flex-col items-center justify-between py-16 px-6 md:px-12 lg:px-24">
    
    <!-- Header / Logo Section -->
    <header class="relative z-10 w-full flex justify-center pt-8 md:pt-12">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 md:w-12 md:h-12 flex items-center justify-center">
           <!-- Blue TB monogram representing angular interlocking shapes (Logo-1 variant) -->
           <svg viewBox="0 0 100 100" class="w-full h-full text-[#3656CE] fill-current">
             <path d="M20 10 H80 V25 H57 V90 H42 V25 H20 V10 Z" />
             <path d="M57 40 H75 C85 40 90 45 90 55 V75 C90 85 85 90 75 90 H42 V75 H75 V55 H57 V40 Z" />
           </svg>
        </div>
        <div class="flex items-baseline gap-1">
          <span class="text-[#000000] font-bold text-lg md:text-xl tracking-tight">TrueBuilder</span>
          <span class="text-[#6E7185] font-normal text-sm md:text-base">.ai</span>
        </div>
      </div>
    </header>

    <!-- Main Content Section -->
    <main class="relative z-10 w-full max-w-4xl flex flex-col items-center text-center mt-20 md:mt-0">
      <div class="mb-8">
        <span class="inline-flex items-center px-4 py-1.5 rounded-full bg-[#E6EFF1] text-[#6E7185] text-[10px] md:text-xs font-bold uppercase tracking-widest-xl">
          Coming Soon
        </span>
      </div>
      
      <h1 class="text-[#1A1A1A] font-semibold text-5xl md:text-6xl lg:text-[64px] tracking-tight leading-[1.1] mb-6">
        The Future Is Coming.
      </h1>

      <div class="mb-12 max-w-lg">
        <p class="text-[#6E7185] text-lg md:text-xl font-normal">
          AI-powered construction intelligence. <br class="hidden md:block" />Be the first to know.
        </p>
      </div>

      <!-- Minimalist Waitlist Form -->
      <div class="w-full max-w-md mx-auto">
        <form class="flex flex-col sm:flex-row items-center gap-4">
          <div class="relative w-full">
            <input 
              type="email" 
              placeholder="Email address" 
              required
              class="w-full bg-white border border-[#D5DDE5] text-[#1A1A1A] placeholder-[#6E7185]/50 px-5 py-3.5 rounded-lg outline-none focus:border-[#3656CE] focus:ring-1 focus:ring-[#3656CE] transition-all text-base"
            >
          </div>
          <button 
            id="cta-notify-btn"
            type="submit" 
            class="text-[#3656CE] font-semibold text-lg hover:opacity-80 transition-all active:scale-95 flex items-center gap-1 whitespace-nowrap px-4 py-3.5"
          >
            Notify Me <iconify-icon icon="lucide:arrow-right" class="mt-0.5"></iconify-icon>
          </button>
        </form>
      </div>
    </main>

    <!-- Footer Section -->
    <footer class="relative z-10 w-full flex flex-col items-center gap-8 mt-24 mb-4">
      <div class="flex gap-10 text-[#6E7185]/60">
        <a href="#" id="social-linkedin" class="hover:text-[#3656CE] transition-colors">
          <iconify-icon icon="lucide:linkedin" width="22"></iconify-icon>
        </a>
        <a href="#" id="social-twitter" class="hover:text-[#3656CE] transition-colors">
          <iconify-icon icon="lucide:twitter" width="22"></iconify-icon>
        </a>
      </div>
      
      <div class="text-[#6E7185]/50 text-[11px] md:text-xs uppercase tracking-widest font-medium">
        &copy; 2024 TrueBuilder.ai &bull; Privacy First Construction Data
      </div>
    </footer>

  </div>
</body>
</html>
