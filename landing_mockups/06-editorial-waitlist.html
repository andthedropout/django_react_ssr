<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueBuilder.ai | Coming Soon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    @view-transition { navigation: auto; }
    
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #0A0A0A;
      color: #FFFFFF;
      overflow-x: hidden;
    }

    .headline-depth {
      position: relative;
      line-height: 0.85;
      letter-spacing: -0.04em;
    }

    .headline-outline {
      position: absolute;
      top: 4px;
      left: 4px;
      color: transparent;
      -webkit-text-stroke: 1px #3656CE;
      opacity: 0.3;
      z-index: -1;
      user-select: none;
      pointer-events: none;
    }

    .noise-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.03;
      pointer-events: none;
      z-index: 50;
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-spin-slow {
      animation: spin-slow 20s linear infinite;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>

  <div class="min-h-screen relative flex flex-col justify-between py-8 px-6 md:px-12 lg:px-20 max-w-[1440px] mx-auto">
    
    <!-- Header -->
    <header class="flex justify-between items-center z-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10">
           <svg viewBox="0 0 100 100" class="w-full h-full text-white fill-current">
             <path d="M20 10 H80 V25 H57 V90 H42 V25 H20 V10 Z" />
             <path d="M57 40 H75 C85 40 90 45 90 55 V75 C90 85 85 90 75 90 H42 V75 H75 V55 H57 V40 Z" />
           </svg>
        </div>
        <span class="text-white font-extrabold text-xl tracking-tighter">TrueBuilder.ai</span>
      </div>
      <div class="hidden md:flex items-center gap-4">
        <div class="w-2 h-2 rounded-full bg-[#3656CE] animate-pulse"></div>
        <span class="text-[#6E7185] text-xs uppercase tracking-widest">System Online</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col justify-center mt-20 mb-12">
      <!-- Top Label -->
      <div class="flex items-center gap-4 mb-8">
        <div class="h-[1px] w-6 bg-[#3656CE]"></div>
        <span class="text-[#6E7185] text-xs md:text-sm font-semibold uppercase tracking-[0.2em]">Early Access</span>
      </div>

      <!-- Headline -->
      <div class="mb-16">
        <h1 class="headline-depth text-[11vw] font-extrabold uppercase">
          <span class="headline-outline">The Future Is Coming</span>
          <span class="block">The Future Is Coming</span>
        </h1>
      </div>

      <!-- Divider -->
      <div class="h-[1px] w-full bg-[#1E1E24] mb-12"></div>

      <!-- Grid Section -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24">
        <!-- Left Column -->
        <div class="flex flex-col gap-8">
          <p class="text-[#6E7185] text-xl md:text-2xl font-light leading-relaxed max-w-md">
            Building the tools that build the future.
          </p>
          <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-[#3656CE]"></div>
            <span class="text-[#42424D] mono text-sm uppercase">Batch 001 Opening</span>
          </div>
        </div>

        <!-- Right Column (Form) -->
        <div class="flex flex-col gap-6">
          <form class="flex flex-col sm:flex-row gap-3">
            <input 
              type="email" 
              placeholder="Enter email address" 
              required
              class="flex-1 bg-transparent border border-[#42424D] text-white px-6 py-4 rounded-none outline-none focus:border-[#3656CE] transition-colors text-base"
            >
            <button 
              id="cta-request-access"
              type="submit" 
              class="bg-[#3656CE] text-white px-10 py-4 font-bold hover:bg-[#2CB6FA] transition-all active:scale-95 whitespace-nowrap"
            >
              Request Access
            </button>
          </form>
          <p class="text-[#42424D] text-xs uppercase tracking-widest">Zero spam. Pure utility.</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="flex flex-col md:flex-row justify-between items-end md:items-center pt-8 border-t border-[#1E1E24]/30">
      <div class="text-[#42424D] text-[10px] uppercase tracking-[0.3em] font-medium">
        &copy; 2024 TrueBuilder.ai / All Rights Reserved
      </div>
      
      <!-- Rotating Badge -->
      <div class="fixed bottom-12 right-12 z-20">
        <div class="relative w-24 h-24">
          <svg viewBox="0 0 100 100" class="w-full h-full animate-spin-slow">
            <defs>
              <path id="circlePath" d="M 50, 50 m -37, 0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0" />
            </defs>
            <text class="fill-[#6E7185] text-[10px] font-bold uppercase tracking-[0.2em]">
              <textPath href="#circlePath">Waiting List • Waiting List • </textPath>
            </text>
          </svg>
          <div class="absolute inset-0 flex items-center justify-center">
            <iconify-icon icon="lucide:arrow-right" class="text-[#3656CE] text-xl"></iconify-icon>
          </div>
        </div>
      </div>
    </footer>

  </div>
</body>
</html>
