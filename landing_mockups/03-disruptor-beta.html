<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueBuilder.ai | DISRUPTOR BETA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Manrope', sans-serif;
      background-color: #121212;
      color: #FFFFFF;
      overflow-x: hidden;
    }
    .font-mono-label {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .neo-shadow {
      box-shadow: 8px 8px 0px 0px #3656CE;
    }
    .neo-shadow-black {
      box-shadow: 8px 8px 0px 0px #000000;
    }
    .vertical-text {
      writing-mode: vertical-rl;
    }
    .headline-tight {
      line-height: 0.85;
    }
    .border-thick {
      border-width: 4px !important;
    }
    /* Geometric background elements */
    .geo-emblem {
      position: absolute;
      z-index: 0;
      opacity: 0.03;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="min-h-screen relative flex flex-col items-center justify-center p-6 md:p-12 overflow-hidden">
    
    <!-- Vertical Left Edge Text -->
    <div class="fixed left-4 top-1/2 -translate-y-1/2 hidden lg:flex flex-col items-center gap-4 vertical-text font-mono-label text-white/40 text-sm">
      <span>TRUEBUILDER.AI — 2026</span>
      <div class="w-[4px] h-32 bg-white/10"></div>
    </div>

    <!-- Large Geometric Emblem Background -->
    <div class="geo-emblem top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw]">
      <svg viewBox="0 0 100 100" fill="currentColor" class="w-full h-full">
        <path d="M20 10 H80 V25 H57 V90 H42 V25 H20 V10 Z" />
        <path d="M57 40 H75 C85 40 90 45 90 55 V75 C90 85 85 90 75 90 H42 V75 H75 V55 H57 V40 Z" />
      </svg>
    </div>

    <!-- Header Section -->
    <header class="absolute top-0 w-full p-8 flex justify-between items-start z-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 border-thick border-white flex items-center justify-center bg-[#3656CE]">
           <svg viewBox="0 0 100 100" class="w-6 h-6 text-white fill-current">
             <path d="M20 10 H80 V25 H57 V90 H42 V25 H20 V10 Z" />
             <path d="M57 40 H75 C85 40 90 45 90 55 V75 C90 85 85 90 75 90 H42 V75 H75 V55 H57 V40 Z" />
           </svg>
        </div>
        <span class="font-mono-label font-bold text-lg hidden sm:inline">TrueBuilder.ai</span>
      </div>
      <div class="bg-white text-black font-mono-label font-bold px-4 py-2 border-thick border-black rotate-[-1deg] text-xs md:text-sm neo-shadow">
        SYSTEM_STATUS: PRE_BETA
      </div>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 w-full max-w-7xl flex flex-col items-center text-center">
      
      <!-- Tilted Sticker Container -->
      <div class="mb-8 rotate-[3deg] inline-block">
        <div class="bg-[#3656CE] border-thick border-white px-6 py-2">
          <p class="font-mono-label text-white font-bold text-base md:text-xl">
            COMING SOON
          </p>
        </div>
      </div>

      <h1 class="text-white font-[900] text-[15vw] md:text-[clamp(4rem,15vw,180px)] headline-tight tracking-tighter uppercase mb-12">
        THE FUTURE<br/>IS COMING
      </h1>

      <!-- Action Area -->
      <div class="w-full max-w-2xl mx-auto flex flex-col items-center">
        <div class="w-full bg-[#3656CE] p-8 md:p-12 mb-12 border-thick border-black neo-shadow-black text-white">
           <p class="font-mono-label text-lg md:text-xl mb-8">
             AI-POWERED CONSTRUCTION INTELLIGENCE
           </p>
           
           <form class="flex flex-col md:flex-row gap-0">
             <input 
               type="email" 
               placeholder="USER@DOMAIN.COM" 
               required
               class="flex-1 bg-white text-black placeholder-black/40 px-6 py-5 border-thick border-black outline-none font-mono-label font-bold text-base md:text-lg"
             >
             <button 
               id="cta-signup-btn"
               type="submit" 
               class="bg-black text-white px-8 py-5 border-thick border-l-0 border-black font-mono-label font-bold hover:bg-zinc-800 transition-colors active:translate-x-1 active:translate-y-1 text-base md:text-lg whitespace-nowrap"
             >
               GET EARLY ACCESS
             </button>
           </form>
        </div>

        <div class="flex flex-wrap justify-center gap-6">
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-[#3656CE] border-2 border-white"></div>
            <span class="font-mono-label text-[10px] md:text-xs text-white/60">CONSTRUCTION_DATA_VISUALIZER</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-[#3656CE] border-2 border-white"></div>
            <span class="font-mono-label text-[10px] md:text-xs text-white/60">AUTONOMOUS_SITE_PLANNING</span>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-[#3656CE] border-2 border-white"></div>
            <span class="font-mono-label text-[10px] md:text-xs text-white/60">REAL_TIME_COST_ANALYTICS</span>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer / Bottom Note -->
    <footer class="absolute bottom-8 w-full px-8 flex flex-col md:flex-row justify-between items-center gap-4 z-10">
      <div class="font-mono-label text-[10px] text-white/30">
        PRIVACY_FIRST_ENCRYPTION_ACTIVE
      </div>
      
      <div class="flex gap-4">
        <a href="#" id="social-li" class="w-10 h-10 border-2 border-white/20 flex items-center justify-center hover:bg-white hover:text-black transition-all">
          <iconify-icon icon="lucide:linkedin" width="18"></iconify-icon>
        </a>
        <a href="#" id="social-tw" class="w-10 h-10 border-2 border-white/20 flex items-center justify-center hover:bg-white hover:text-black transition-all">
          <iconify-icon icon="lucide:twitter" width="18"></iconify-icon>
        </a>
      </div>

      <div class="font-mono-label text-[10px] text-white/30">
        &copy; 2024 TRUEBUILDER.AI
      </div>
    </footer>

    <!-- Decorative Accents -->
    <div class="fixed top-0 left-0 w-24 h-24 border-l-thick border-t-thick border-[#3656CE] pointer-events-none"></div>
    <div class="fixed bottom-0 right-0 w-24 h-24 border-r-thick border-b-thick border-[#3656CE] pointer-events-none"></div>
    
  </div>
</body>
</html>
