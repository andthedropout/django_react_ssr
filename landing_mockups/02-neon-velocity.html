<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueBuilder.ai | Neon Velocity</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Azeret+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #050505;
      color: #FFFFFF;
      font-family: 'Manrope', sans-serif;
      overflow-x: hidden;
    }
    .font-mono {
      font-family: 'Azeret Mono', monospace;
    }
    .headline-clamp {
      font-size: clamp(2.6rem, 10vw, 8.75rem);
      line-height: 0.85;
    }
    .noise-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0.03;
      z-index: 50;
    }
    .glow-radial {
      background: radial-gradient(circle, #3656CE 0%, transparent 70%);
      opacity: 0.15;
      filter: blur(80px);
    }
    .tabular-nums {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <!-- Noise Overlay -->
  <div class="noise-overlay">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      </filter>
      <rect width="100%" height="100%" filter="url(#noiseFilter)" />
    </svg>
  </div>

  <div class="min-h-screen relative flex flex-col justify-between p-6 md:p-12 lg:p-16">
    
    <!-- Background Glow -->
    <div class="glow-radial absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] rounded-full pointer-events-none z-0"></div>

    <!-- Header -->
    <header class="relative z-10">
      <a href="#" id="nav-logo-link" class="font-mono text-xs md:text-sm tracking-[0.5em] font-medium flex items-center gap-3">
        <svg viewBox="0 0 100 100" class="w-6 h-6 text-white fill-current">
          <path d="M20 10 H80 V25 H57 V90 H42 V25 H20 V10 Z" />
          <path d="M57 40 H75 C85 40 90 45 90 55 V75 C90 85 85 90 75 90 H42 V75 H75 V55 H57 V40 Z" />
        </svg>
        TRUEBUILDER.AI
      </a>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center justify-center flex-grow py-12">
      
      <!-- Boxed Headline -->
      <div class="border-[12px] border-white p-6 md:p-12 lg:p-16 mb-8 w-full max-w-[95vw] lg:max-w-7xl mx-auto flex justify-center">
        <h1 class="headline-clamp font-extrabold uppercase tracking-[-0.05em] text-center">
          THE FUTURE<br>IS COMING
        </h1>
      </div>

      <!-- Metadata Row -->
      <div class="w-full max-w-[95vw] lg:max-w-7xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-16 px-4">
        <div class="font-mono text-[10px] tracking-[0.5em] text-white/60 uppercase">
          STATUS: COMING SOON // TRUEBUILDER.AI
        </div>
        <div class="font-mono text-[10px] tracking-[0.5em] text-white uppercase tabular-nums">
          LAUNCHING 2026
        </div>
      </div>

      <!-- Email Form Section -->
      <div class="w-full max-w-xl mx-auto px-4">
        <form class="flex flex-col sm:flex-row p-1.5 bg-white/5 backdrop-blur-xl border border-white/10 rounded-full">
          <input 
            type="email" 
            placeholder="ENTER EMAIL ADDRESS"
            required
            class="flex-1 bg-transparent border-none outline-none px-8 py-4 font-mono text-xs md:text-sm tracking-widest placeholder:text-white/30 text-white rounded-full"
          >
          <button 
            id="cta-access-btn"
            type="submit" 
            class="bg-[#3656CE] text-white px-10 py-4 rounded-full font-extrabold uppercase text-xs md:text-sm tracking-widest transition-all hover:brightness-110 active:scale-95 shadow-[0_0_20px_rgba(54,86,206,0.3)]"
          >
            Get Early Access
          </button>
        </form>
      </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="font-mono text-[10px] tracking-[0.5em] text-white/30 uppercase">
        &copy; 2024 TRUEBUILDER.AI
      </div>
      
      <!-- Social Icons -->
      <div class="flex gap-6">
        <a href="#" id="social-x-link" class="text-white/40 hover:text-[#2CB6FA] transition-colors">
          <iconify-icon icon="ri:twitter-x-fill" class="text-lg"></iconify-icon>
        </a>
        <a href="#" id="social-linkedin-link" class="text-white/40 hover:text-[#2CB6FA] transition-colors">
          <iconify-icon icon="ri:linkedin-box-fill" class="text-lg"></iconify-icon>
        </a>
        <a href="#" id="social-github-link" class="text-white/40 hover:text-[#2CB6FA] transition-colors">
          <iconify-icon icon="ri:github-fill" class="text-lg"></iconify-icon>
        </a>
      </div>

      <div class="font-mono text-[10px] tracking-[0.5em] text-white/30 uppercase hidden md:block">
        PRIVACY_PROTOCOL_V1.0
      </div>
    </footer>

    <!-- Accent Elements -->
    <div class="fixed bottom-0 left-0 w-32 h-1 bg-[#2CB6FA] opacity-20"></div>
    <div class="fixed top-0 right-0 w-1 h-32 bg-[#2CB6FA] opacity-20"></div>

  </div>
</body>
</html>
