# ============================================================================
# Split-container architecture:
#   nginx  → reverse proxy + static asset host (the only port exposed to host)
#   web    → Django + gunicorn (internal :8000)
#   ssr    → Bun TanStack Start SSR (internal :3000)
#   js     → Vite dev server (only when COMPOSE_PROFILES includes "dev")
#   postgres / redis are profile-gated and never exposed to host by default.
#
# All host ports come from .env so multiple clones don't collide.
# Run `bin/pick-ports` to auto-assign a fresh, conflict-free set.
# ============================================================================

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  args:
    UID: "${UID:-1000}"
    GID: "${GID:-1000}"
    VITE_FRONTEND_THEME: "${VITE_FRONTEND_THEME:-vercel}"

x-logging: &default-logging
  driver: "local"            # auto-rotates; no GB-of-logs surprises
  options: { max-size: "10m", max-file: "3" }

x-app-env: &app-env
  env_file:
    - path: .env
      required: true
    - path: .env.local         # contributor-local overrides, gitignored
      required: false
  restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
  stop_grace_period: 3s
  logging: *default-logging

services:
  postgres:
    profiles: ["postgres", "prod", "dev"]
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    logging: *default-logging

  redis:
    profiles: ["redis", "prod", "dev"]
    image: redis:7.4-alpine
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    logging: *default-logging

  # ---- Production-style stack (split containers, nginx out front) ----
  web:
    profiles: ["prod", "web"]
    <<: *app-env
    build: { <<: *app-build, target: web }
    depends_on:
      postgres: { condition: service_healthy, required: false }
      redis:    { condition: service_healthy, required: false }
    volumes:
      - "./media:/mnt/media"  # user uploads (matches MEDIA_ROOT)
    expose: ["8000"]

  ssr:
    profiles: ["prod", "ssr"]
    <<: *app-env
    build: { <<: *app-build, target: ssr }
    depends_on:
      web: { condition: service_healthy }
    expose: ["3000"]
    environment:
      PORT: "3000"            # explicit override in case .env has a stale PORT

  nginx:
    profiles: ["prod", "nginx"]
    <<: *app-env
    build: { <<: *app-build, target: nginx }
    depends_on:
      web: { condition: service_healthy }
      ssr: { condition: service_started }
    ports:
      - "${WEB_PORT:-8002}:8080"

  # ---- Optional: Celery workers (only when REDIS_URL is set) ----
  worker:
    profiles: ["worker", "celery"]
    <<: *app-env
    build: { <<: *app-build, target: web }
    entrypoint: []
    command: celery -A config worker -l "${CELERY_LOG_LEVEL:-info}" --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    init: true
    restart: "on-failure:5"
    deploy:
      resources:
        limits:        { cpus: "1.0", memory: 1G, pids: 200 }
        reservations:  { cpus: "0.25", memory: 256M }

  beat:
    profiles: ["beat", "celery"]
    <<: *app-env
    build: { <<: *app-build, target: web }
    entrypoint: []
    command: celery -A config beat -l "${CELERY_LOG_LEVEL:-info}"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    init: true
    restart: "on-failure:5"

  # ---- Dev mode: Vite HMR + Django with --reload ----
  # `docker compose --profile dev up` runs:
  #   - postgres (shared with prod profile)
  #   - web-dev    (Django gunicorn with --reload, exposed on :${DJANGO_PORT})
  #   - js         (Vite dev server, exposed on :${VITE_PORT})
  # No nginx, no SSR — Vite handles the client and proxies API calls.
  web-dev:
    profiles: ["dev"]
    <<: *app-env
    build: { <<: *app-build, target: web }
    depends_on:
      postgres: { condition: service_healthy, required: false }
      redis:    { condition: service_healthy, required: false }
    command: gunicorn -c python:config.gunicorn config.wsgi --bind 0.0.0.0:8000 --reload
    volumes:
      - ./backend:/app/backend
      - ./public:/app/public
      - ./design-system:/app/design-system
      - ./media:/mnt/media
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    restart: "no"

  js:
    profiles: ["dev"]
    image: oven/bun:1-slim
    working_dir: /app/frontend
    command: sh -c "bun install --frozen-lockfile && bun dev --host 0.0.0.0 --port 5175"
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      VITE_PORT: "5175"
      DJANGO_API_URL: "http://web-dev:8000"
      DISABLE_ROUTE_GEN: "true"
    volumes:
      - .:/app:delegated
      - bun_node_modules:/app/frontend/node_modules
    ports:
      - "${VITE_PORT:-5175}:5175"
    init: true
    restart: "no"
    logging: *default-logging

volumes:
  postgres: {}
  redis: {}
  bun_node_modules: {}
