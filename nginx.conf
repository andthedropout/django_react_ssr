worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    # Unprivileged nginx can't write to /var/cache/nginx — point everything at /tmp.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Shared proxy headers for all upstreams.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    # Upstreams resolve via Docker network DNS (service names from compose.yaml).
    upstream django  { server web:8000; }
    upstream bun_ssr { server ssr:3000; }

    server {
        listen 8080 default_server;
        server_name _;
        client_max_body_size 100M;
        root /usr/share/nginx/html/static;   # baked-in client assets (.output/public/*)

        # Django routes — listed first so they win over any static fallback.
        location /api/       { proxy_pass http://django; }
        location /admin/     { proxy_pass http://django; }
        location = /admin    { return 301 /admin/; }
        location /up         { proxy_pass http://django; access_log off; }
        location /media/     { proxy_pass http://django; }
        location /markdownx/ { proxy_pass http://django; }

        # Long-cache the content-hashed assets.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Try a static file from the baked client dir (favicon.svg, manifest, etc.);
        # if not found, proxy to the Bun SSR server for real React rendering.
        location / {
            try_files $uri @ssr;
        }
        location @ssr {
            proxy_pass http://bun_ssr;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
